name: Setup governance toolchain
description: Provision the hash-locked evaluator toolchain outside the target workspace.

inputs:
  governance-root:
    description: Path to the exact governance checkout that owns the lock.
    required: true
  base-sha:
    description: Exact base commit for publication or evaluation evidence.
    required: true
  evaluator-sha:
    description: Exact governance commit evaluated by this runtime.
    required: true
  python-path:
    description: Absolute interpreter path produced by actions/setup-python.
    required: true
  repository:
    description: Authoritative owner/repository identity from the workflow context.
    required: true
  repository-id:
    description: Authoritative repository database ID from the workflow context.
    required: true
  head-repository-id:
    description: Authoritative head repository database ID from the workflow context.
    required: true
  event-name:
    description: Authoritative workflow event name.
    required: true
  pull-request-number:
    description: Authoritative pull request number.
    required: true
  workflow-ref:
    description: Authoritative workflow ref from the workflow context.
    required: true
  workflow-sha:
    description: Authoritative workflow commit from the workflow context.
    required: true
  run-id:
    description: Authoritative workflow run ID.
    required: true
  run-attempt:
    description: Authoritative workflow run attempt.
    required: true
  expected-artifact-name:
    description: Exact artifact name reserved for this run and attempt.
    required: true

outputs:
  python-path:
    description: Absolute Python path inside the provisioned runtime.
    value: ${{ steps.bootstrap.outputs.python-path }}
  bin-path:
    description: Absolute executable directory inside the provisioned runtime.
    value: ${{ steps.bootstrap.outputs.bin-path }}
  receipt-path:
    description: Machine-readable toolchain receipt path.
    value: ${{ steps.bootstrap.outputs.receipt-path }}
  lock-sha256:
    description: SHA-256 digest of the installed lock.
    value: ${{ steps.bootstrap.outputs.lock-sha256 }}
  receipt-file-sha256:
    description: SHA-256 digest of the serialized receipt file.
    value: ${{ steps.bootstrap.outputs.receipt-file-sha256 }}

runs:
  using: composite
  steps:
    - name: Provision hash-locked Ruff runtime
      id: bootstrap
      shell: bash
      env:
        BASE_PYTHON: ${{ inputs.python-path }}
        BASE_SHA: ${{ inputs.base-sha }}
        EVALUATOR_SHA: ${{ inputs.evaluator-sha }}
        EVENT_NAME: ${{ inputs.event-name }}
        EXPECTED_ARTIFACT_NAME: ${{ inputs.expected-artifact-name }}
        GH_TOKEN: ""
        GITHUB_TOKEN: ""
        GOVERNANCE_ROOT: ${{ inputs.governance-root }}
        HEAD_REPOSITORY_ID: ${{ inputs.head-repository-id }}
        PYTHONHOME: ""
        PYTHONPATH: ""
        PULL_REQUEST_NUMBER: ${{ inputs.pull-request-number }}
        REPOSITORY: ${{ inputs.repository }}
        REPOSITORY_ID: ${{ inputs.repository-id }}
        RUN_ATTEMPT: ${{ inputs.run-attempt }}
        RUN_ID: ${{ inputs.run-id }}
        WORKFLOW_REF: ${{ inputs.workflow-ref }}
        WORKFLOW_SHA: ${{ inputs.workflow-sha }}
      run: |
        set -euo pipefail
        base_python="${BASE_PYTHON:?}"
        runtime_root="${RUNNER_TEMP:?}/governance-toolchain"
        receipt_path="${RUNNER_TEMP}/governance-toolchain-receipt.json"
        "$base_python" -I "${GOVERNANCE_ROOT:?}/governance_eval/toolchain_bootstrap.py" \
          --governance-root "${GOVERNANCE_ROOT:?}" \
          --workspace-root "${GITHUB_WORKSPACE:?}" \
          --runtime-root "$runtime_root" \
          --base-sha "${BASE_SHA:?}" \
          --evaluator-sha "${EVALUATOR_SHA:?}" \
          --repository "${REPOSITORY:?}" \
          --repository-id "${REPOSITORY_ID:?}" \
          --head-repository-id "${HEAD_REPOSITORY_ID:?}" \
          --event-name "${EVENT_NAME:?}" \
          --pull-request-number "$PULL_REQUEST_NUMBER" \
          --workflow-ref "${WORKFLOW_REF:?}" \
          --workflow-sha "${WORKFLOW_SHA:?}" \
          --run-id "${RUN_ID:?}" \
          --run-attempt "${RUN_ATTEMPT:?}" \
          --expected-artifact-name "${EXPECTED_ARTIFACT_NAME:?}" \
          --receipt "$receipt_path" \
          --failure-receipt "$receipt_path" \
          --github-output "${GITHUB_OUTPUT:?}"
