name: Delivery Receipt

on:
  workflow_call:
    inputs:
      target-repository:
        required: true
        type: string
      target-repository-url:
        required: true
        type: string
      target-base-sha:
        required: true
        type: string
      target-head-sha:
        required: true
        type: string
      target-pr-number:
        required: true
        type: string
      target-pr-url:
        required: true
        type: string
      target-pr-head-sha:
        required: true
        type: string
      target-pr-base-sha:
        required: true
        type: string
      merge-group-ref:
        required: true
        type: string
      merge-group-sha:
        required: true
        type: string
      merge-group-event-id:
        required: true
        type: string
      event-created-at:
        required: true
        type: string
      governance-ref:
        required: true
        type: string
      supportability-artifact-name:
        required: false
        type: string
        default: supportability-gate-evidence
      supportability-artifact-id:
        required: false
        type: string
        default: ""
      supportability-artifact-digest:
        required: false
        type: string
        default: ""
      candidate-supportability-artifact-id:
        required: false
        type: string
        default: ""
      candidate-supportability-artifact-name:
        required: false
        type: string
        default: candidate-supportability-gate-evidence
      candidate-supportability-artifact-digest:
        required: false
        type: string
        default: ""
      receipt-artifact-name:
        required: false
        type: string
        default: supportability-delivery-receipt
    outputs:
      owner-status:
        description: GREEN when the receipt and remote audit pass.
        value: ${{ jobs.receipt.outputs.owner-status }}
      artifact-id:
        description: Uploaded delivery receipt artifact ID.
        value: ${{ jobs.receipt.outputs.artifact-id }}
      artifact-digest:
        description: Uploaded delivery receipt artifact digest.
        value: ${{ jobs.receipt.outputs.artifact-digest }}

permissions:
  actions: read
  checks: read
  contents: read
  pull-requests: read

jobs:
  receipt:
    name: Delivery Receipt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      owner-status: ${{ steps.summary.outputs.owner_status }}
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
      artifact-digest: ${{ steps.upload.outputs.artifact-digest }}
    env:
      TARGET_REPOSITORY: ${{ inputs.target-repository }}
      TARGET_REPOSITORY_URL: ${{ inputs.target-repository-url }}
      TARGET_BASE_SHA: ${{ inputs.target-base-sha }}
      TARGET_HEAD_SHA: ${{ inputs.target-head-sha }}
      TARGET_PR_NUMBER: ${{ inputs.target-pr-number }}
      TARGET_PR_URL: ${{ inputs.target-pr-url }}
      TARGET_PR_HEAD_SHA: ${{ inputs.target-pr-head-sha }}
      TARGET_PR_BASE_SHA: ${{ inputs.target-pr-base-sha }}
      MERGE_GROUP_REF: ${{ inputs.merge-group-ref }}
      MERGE_GROUP_SHA: ${{ inputs.merge-group-sha }}
      MERGE_GROUP_EVENT_ID: ${{ inputs.merge-group-event-id }}
      EVENT_CREATED_AT: ${{ inputs.event-created-at }}
      GOVERNANCE_REF: ${{ inputs.governance-ref }}
      SUPPORTABILITY_ARTIFACT_NAME: ${{ inputs.supportability-artifact-name }}
      SUPPORTABILITY_ARTIFACT_ID: ${{ inputs.supportability-artifact-id }}
      SUPPORTABILITY_ARTIFACT_DIGEST: ${{ inputs.supportability-artifact-digest }}
      CANDIDATE_SUPPORTABILITY_ARTIFACT_NAME: ${{ inputs.candidate-supportability-artifact-name }}
      CANDIDATE_SUPPORTABILITY_ARTIFACT_ID: ${{ inputs.candidate-supportability-artifact-id }}
      CANDIDATE_SUPPORTABILITY_ARTIFACT_DIGEST: ${{ inputs.candidate-supportability-artifact-digest }}
      RECEIPT_ARTIFACT_NAME: ${{ inputs.receipt-artifact-name }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout governance evaluator
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          repository: markheck-solutions/governance
          ref: ${{ inputs.governance-ref }}
          path: governance
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
      - name: Validate workflow inputs
        shell: bash
        run: |
          python - <<'PY'
          import os
          import re
          import sys

          sha_re = re.compile(r"^[0-9a-f]{40}$")
          artifact_re = re.compile(r"^[A-Za-z0-9_.-]{1,120}$")
          if not sha_re.fullmatch(os.environ["TARGET_BASE_SHA"]):
              print("Invalid target base SHA", file=sys.stderr)
              raise SystemExit(64)
          if not sha_re.fullmatch(os.environ["TARGET_HEAD_SHA"]):
              print("Invalid target head SHA", file=sys.stderr)
              raise SystemExit(64)
          if not sha_re.fullmatch(os.environ["TARGET_PR_HEAD_SHA"]):
              print("Invalid pull-request head SHA", file=sys.stderr)
              raise SystemExit(64)
          if not sha_re.fullmatch(os.environ["TARGET_PR_BASE_SHA"]):
              print("Invalid pull-request base SHA", file=sys.stderr)
              raise SystemExit(64)
          if not sha_re.fullmatch(os.environ["GOVERNANCE_REF"]):
              print("Governance ref must be an exact commit SHA", file=sys.stderr)
              raise SystemExit(64)
          repository = os.environ["TARGET_REPOSITORY"]
          if not re.fullmatch(r"[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+", repository):
              print("Invalid target repository", file=sys.stderr)
              raise SystemExit(64)
          expected_url = f"https://github.com/{repository}.git"
          if os.environ["TARGET_REPOSITORY_URL"] != expected_url:
              print("Target repository URL must be canonical GitHub HTTPS URL", file=sys.stderr)
              raise SystemExit(64)
          if not re.fullmatch(r"[1-9][0-9]{0,9}", os.environ["TARGET_PR_NUMBER"]):
              print("Invalid target PR number", file=sys.stderr)
              raise SystemExit(64)
          merge_group_sha = os.environ["MERGE_GROUP_SHA"]
          if merge_group_sha:
              if (
                  merge_group_sha != os.environ["TARGET_HEAD_SHA"]
                  or os.environ["TARGET_PR_BASE_SHA"] != os.environ["TARGET_BASE_SHA"]
                  or not os.environ["MERGE_GROUP_REF"].startswith(
                      "gh-readonly-queue/"
                  )
                  or not re.fullmatch(
                      r"merge-group:[1-9][0-9]*:[1-9][0-9]*",
                      os.environ["MERGE_GROUP_EVENT_ID"],
                  )
                  or not re.fullmatch(
                      r"[0-9]{4}-[0-9]{2}-[0-9]{2}T"
                      r"[0-9]{2}:[0-9]{2}:[0-9]{2}Z",
                      os.environ["EVENT_CREATED_AT"],
                  )
              ):
                  print("Invalid merge-group receipt inputs", file=sys.stderr)
                  raise SystemExit(64)
          elif (
              os.environ["TARGET_PR_HEAD_SHA"] != os.environ["TARGET_HEAD_SHA"]
              or os.environ["TARGET_PR_BASE_SHA"] != os.environ["TARGET_BASE_SHA"]
              or os.environ["MERGE_GROUP_REF"]
              or os.environ["MERGE_GROUP_EVENT_ID"]
          ):
              print("Invalid pull-request receipt inputs", file=sys.stderr)
              raise SystemExit(64)
          for key in ("SUPPORTABILITY_ARTIFACT_NAME", "CANDIDATE_SUPPORTABILITY_ARTIFACT_NAME", "RECEIPT_ARTIFACT_NAME"):
              if not artifact_re.fullmatch(os.environ[key]):
                  print(f"Invalid artifact name in {key}", file=sys.stderr)
                  raise SystemExit(64)
          for key in ("SUPPORTABILITY_ARTIFACT_ID", "CANDIDATE_SUPPORTABILITY_ARTIFACT_ID"):
              artifact_id = os.environ[key]
              if artifact_id and not re.fullmatch(r"[1-9][0-9]{0,19}", artifact_id):
                  print(f"Invalid artifact ID in {key}", file=sys.stderr)
                  raise SystemExit(64)
          for key in ("SUPPORTABILITY_ARTIFACT_DIGEST", "CANDIDATE_SUPPORTABILITY_ARTIFACT_DIGEST"):
              artifact_digest = os.environ[key]
              if artifact_digest and not re.fullmatch(r"(sha256:)?[0-9a-f]{64}", artifact_digest):
                  print(f"Invalid artifact digest in {key}", file=sys.stderr)
                  raise SystemExit(64)
          PY
      - name: Download supportability gate evidence
        id: download
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p evidence/baseline
          if [ -n "${SUPPORTABILITY_ARTIFACT_ID}" ]; then
            gh api "repos/${TARGET_REPOSITORY}/actions/artifacts/${SUPPORTABILITY_ARTIFACT_ID}/zip" > baseline-artifact.zip
            python -c 'import zipfile; from pathlib import Path; zipfile.ZipFile("baseline-artifact.zip").extractall(Path("evidence/baseline"))'
          fi
      - name: Download candidate supportability evidence
        id: download_candidate
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p evidence/candidate
          if [ -n "${CANDIDATE_SUPPORTABILITY_ARTIFACT_ID}" ]; then
            gh api "repos/${TARGET_REPOSITORY}/actions/artifacts/${CANDIDATE_SUPPORTABILITY_ARTIFACT_ID}/zip" > candidate-artifact.zip
            python -c 'import zipfile; from pathlib import Path; zipfile.ZipFile("candidate-artifact.zip").extractall(Path("evidence/candidate"))'
          fi
      - name: Record supportability artifact metadata
        id: supportability_artifact
        if: always()
        shell: bash
        run: |
          digest="${SUPPORTABILITY_ARTIFACT_DIGEST}"
          if [[ "$digest" =~ ^[0-9a-f]{64}$ ]]; then
            digest="sha256:${digest}"
          fi
          {
            echo "id=${SUPPORTABILITY_ARTIFACT_ID}"
            echo "digest=${digest}"
          } >> "$GITHUB_OUTPUT"
      - name: Verify downloaded judge artifacts
        id: judge_artifacts
        if: always()
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import hashlib
          import json
          import os
          import subprocess
          from pathlib import Path

          def normalize(value):
              if value and not value.startswith("sha256:"):
                  return f"sha256:{value}"
              return value

          def evidence_present(root):
              required = {
                  "supportability-gate-result.json",
                  "ai-review-gate-result.json",
                  "architecture-gate-result.json",
              }
              found = {path.name for path in root.rglob("*.json")}
              return required.issubset(found)

          def archive_digest(path):
              if not path.exists():
                  return ""
              return f"sha256:{hashlib.sha256(path.read_bytes()).hexdigest()}"

          def verified(root, archive_path, artifact_id, expected_name, expected_digest):
              expected_digest = normalize(expected_digest)
              if not artifact_id or not expected_name or not expected_digest or not evidence_present(root):
                  return False, ""
              result = subprocess.run(
                  ["gh", "api", f"repos/{os.environ['TARGET_REPOSITORY']}/actions/artifacts/{artifact_id}"],
                  check=True,
                  text=True,
                  capture_output=True,
              )
              payload = json.loads(result.stdout)
              actual_digest = normalize(str(payload.get("digest") or ""))
              run = payload.get("workflow_run") if isinstance(payload.get("workflow_run"), dict) else {}
              ok = (
                  str(payload.get("id") or "") == artifact_id
                  and payload.get("name") == expected_name
                  and str(run.get("id") or "") == os.environ["GITHUB_RUN_ID"]
                  and actual_digest == expected_digest
                  and archive_digest(archive_path) == expected_digest
              )
              return ok, actual_digest

          try:
              baseline_verified, baseline_actual = verified(
                  Path("evidence/baseline"),
                  Path("baseline-artifact.zip"),
                  os.environ["SUPPORTABILITY_ARTIFACT_ID"],
                  os.environ["SUPPORTABILITY_ARTIFACT_NAME"],
                  os.environ["SUPPORTABILITY_ARTIFACT_DIGEST"],
              )
          except Exception:
              baseline_verified, baseline_actual = False, ""
          try:
              candidate_verified, candidate_actual = verified(
                  Path("evidence/candidate"),
                  Path("candidate-artifact.zip"),
                  os.environ["CANDIDATE_SUPPORTABILITY_ARTIFACT_ID"],
                  os.environ["CANDIDATE_SUPPORTABILITY_ARTIFACT_NAME"],
                  os.environ["CANDIDATE_SUPPORTABILITY_ARTIFACT_DIGEST"],
              )
          except Exception:
              candidate_verified, candidate_actual = False, ""
          print(f"baseline_verified={str(baseline_verified).lower()}")
          print(f"candidate_verified={str(candidate_verified).lower()}")
          print(f"baseline_actual_digest={baseline_actual}")
          print(f"candidate_actual_digest={candidate_actual}")
          PY
      - name: Fill missing evidence with RED placeholders
        if: always()
        shell: bash
        run: |
          mkdir -p evidence/baseline evidence/candidate artifacts/supportability
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          import shutil

          gate = Path("evidence/baseline/supportability-gate-result.json")
          ai_review = Path("evidence/baseline/ai-review-gate-result.json")
          architecture = Path("evidence/baseline/architecture-gate-result.json")
          gate_candidates = sorted(Path("evidence/baseline").rglob("supportability-gate-result.json"))
          ai_review_candidates = sorted(Path("evidence/baseline").rglob("ai-review-gate-result.json"))
          architecture_candidates = sorted(Path("evidence/baseline").rglob("architecture-gate-result.json"))
          if not gate.exists() and gate_candidates:
              shutil.copyfile(gate_candidates[0], gate)
          if not ai_review.exists() and ai_review_candidates:
              shutil.copyfile(ai_review_candidates[0], ai_review)
          if not architecture.exists() and architecture_candidates:
              shutil.copyfile(architecture_candidates[0], architecture)
          if not gate.exists():
              gate.write_text(json.dumps({
                  "owner_status": "RED",
                  "repository_url": os.environ["TARGET_REPOSITORY_URL"],
                  "pull_request_url": os.environ["TARGET_PR_URL"],
                  "base_sha": os.environ["TARGET_BASE_SHA"],
                  "head_sha": os.environ["TARGET_HEAD_SHA"],
                  "changed_files": [],
                  "high_risk_files": [],
                  "coverage": {},
                  "errors": ["supportability gate evidence artifact missing"],
              }), encoding="utf-8")
          if not ai_review.exists():
              ai_review.write_text(json.dumps({
                  "owner_status": "RED",
                  "evidence_status": "INVALID_EVIDENCE",
                  "approval_provided": False,
                  "observations": ["AI review evidence artifact missing"],
              }), encoding="utf-8")
          if not architecture.exists():
              architecture.write_text(json.dumps({
                  "owner_status": "RED",
                  "gate_implementation": "FAIL",
                  "repo_architecture_supportability": "FAIL",
                  "architecture_behavior_proof": "FAIL",
                  "errors": ["architecture gate evidence artifact missing"],
              }), encoding="utf-8")
          PY
      - name: Generate delivery receipt
        id: receipt
        continue-on-error: true
        shell: bash
        run: |
          cd governance
          proof_flags=()
          if [ "${{ steps.judge_artifacts.outputs.baseline_verified }}" = "true" ]; then
            proof_flags+=(--protected-baseline-judge-ran --baseline-receipt-produced)
          fi
          if [ "${{ steps.judge_artifacts.outputs.candidate_verified }}" = "true" ]; then
            proof_flags+=(--candidate-judge-ran --candidate-receipt-produced)
          fi
          python -m governance_eval delivery-receipt \
            --gate-result ../evidence/baseline/supportability-gate-result.json \
            --ai-review-result ../evidence/baseline/ai-review-gate-result.json \
            --architecture-result ../evidence/baseline/architecture-gate-result.json \
            --output-dir ../artifacts/supportability \
            --repository-url "$TARGET_REPOSITORY_URL" \
            --pr-url "$TARGET_PR_URL" \
            --run-id "$GITHUB_RUN_ID" \
            --workflow-run-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --job-name "Delivery Receipt" \
            --artifact-name "$SUPPORTABILITY_ARTIFACT_NAME" \
            --artifact-id "${{ steps.supportability_artifact.outputs.id }}" \
            --artifact-digest "${{ steps.judge_artifacts.outputs.baseline_actual_digest }}" \
            --pull-request-head-sha "$TARGET_PR_HEAD_SHA" \
             --evaluation-head-sha "$TARGET_HEAD_SHA" \
             "${proof_flags[@]}"
      - name: Generate authoritative merge-group receipt
        id: merge_group_receipt
        if: ${{ inputs.merge-group-sha != '' }}
        continue-on-error: true
        shell: bash
        env:
          BASELINE_ARTIFACT_DIGEST: ${{ steps.judge_artifacts.outputs.baseline_actual_digest }}
          CANDIDATE_ARTIFACT_DIGEST: ${{ steps.judge_artifacts.outputs.candidate_actual_digest }}
        run: |
          cd governance
          python - <<'PY'
          import hashlib
          import json
          import os
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          from governance_eval.hashing import sha256_file
          from governance_eval.merge_group_authority import (
              create_merge_group_receipt,
              validate_merge_group_artifact,
              verify_merge_group_receipt,
          )

          def unique_claim(root):
              paths = sorted(Path(root).rglob("merge-group-authority.json"))
              if len(paths) != 1:
                  raise RuntimeError(
                      f"expected one merge-group authority claim in {root}; found {len(paths)}"
                  )
              return json.loads(paths[0].read_text(encoding="utf-8"))

          baseline_claim = unique_claim("../evidence/baseline")
          candidate_claim = unique_claim("../evidence/candidate")
          if baseline_claim != candidate_claim:
              raise RuntimeError("baseline and candidate merge-group claims differ")

          authority = {
              "repository": {
                  "id": int(os.environ["GITHUB_REPOSITORY_ID"]),
                  "full_name": os.environ["TARGET_REPOSITORY"],
              },
              "merge_group": {
                  "ref": os.environ["MERGE_GROUP_REF"],
                  "sha": os.environ["MERGE_GROUP_SHA"],
                  "base_ref": "main",
                  "base_sha": os.environ["TARGET_BASE_SHA"],
              },
              "pull_request": {
                  "number": int(os.environ["TARGET_PR_NUMBER"]),
                  "url": os.environ["TARGET_PR_URL"],
                  "head_sha": os.environ["TARGET_PR_HEAD_SHA"],
                  "base_sha": os.environ["TARGET_PR_BASE_SHA"],
                  "base_ref": "main",
              },
          }
          validate_merge_group_artifact(authority, baseline_claim)
          expected_claim = {
              "event_id": os.environ["MERGE_GROUP_EVENT_ID"],
              "event_created_at": os.environ["EVENT_CREATED_AT"],
              "evaluator_sha": os.environ["GOVERNANCE_REF"],
              "workflow_run_id": int(os.environ["GITHUB_RUN_ID"]),
              "workflow_run_attempt": int(os.environ["GITHUB_RUN_ATTEMPT"]),
          }
          for key, value in expected_claim.items():
              if baseline_claim.get(key) != value:
                  raise RuntimeError(f"merge-group claim {key} differs from current run")

          request = urllib.request.Request(
              "https://api.github.com/repos/"
              f"{os.environ['TARGET_REPOSITORY']}/commits/"
              f"{os.environ['TARGET_HEAD_SHA']}/check-runs?per_page=100",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              checks = json.load(response).get("check_runs", [])
          run_marker = f"/actions/runs/{os.environ['GITHUB_RUN_ID']}/job/"
          matches = [
              check
              for check in checks
              if check.get("name") == "Baseline Protected Delivery Receipt / Delivery Receipt"
              and run_marker in str(check.get("details_url") or "")
          ]
          if len(matches) != 1:
              raise RuntimeError(
                  "expected one current protected Delivery Receipt check; "
                  f"found {len(matches)}"
              )
          check = matches[0]
          app = check.get("app") if isinstance(check.get("app"), dict) else {}
          if int(app.get("id") or 0) < 1:
              raise RuntimeError("Delivery Receipt check has no authoritative GitHub App")

          artifact_chain = json.dumps(
              {
                  "baseline": os.environ["BASELINE_ARTIFACT_DIGEST"],
                  "candidate": os.environ["CANDIDATE_ARTIFACT_DIGEST"],
              },
              sort_keys=True,
              separators=(",", ":"),
          ).encode("utf-8")
          evidence = {
              "event_id": os.environ["MERGE_GROUP_EVENT_ID"],
              "event_created_at": os.environ["EVENT_CREATED_AT"],
              "verification_time": datetime.now(timezone.utc).isoformat().replace(
                  "+00:00", "Z"
              ),
              "evaluator_sha": os.environ["GOVERNANCE_REF"],
              "caller_workflow_path": baseline_claim["caller_workflow"]["path"],
              "caller_workflow_sha256": baseline_claim["caller_workflow"]["sha256"],
              "reusable_workflow_path": ".github/workflows/delivery-receipt.yml",
              "reusable_workflow_sha256": sha256_file(
                  Path(".github/workflows/delivery-receipt.yml")
              ),
              "workflow_run_id": int(os.environ["GITHUB_RUN_ID"]),
              "workflow_run_attempt": int(os.environ["GITHUB_RUN_ATTEMPT"]),
              "check_run_id": int(check["id"]),
              "github_app_id": int(app["id"]),
              "config_sha256": baseline_claim["config_sha256"],
              "standard_sha256": baseline_claim["standard_sha256"],
              "transaction_id": baseline_claim["transaction_id"],
              "artifact_digest": hashlib.sha256(artifact_chain).hexdigest(),
          }
          receipt = create_merge_group_receipt(authority, evidence)
          verify_merge_group_receipt(receipt, authority, evidence)
          destination = Path(
              "../artifacts/supportability/governance-merge-group-receipt.json"
          )
          destination.write_text(
              json.dumps(receipt, indent=2, sort_keys=True) + "\n", encoding="utf-8"
          )
          PY
      - name: Verify delivery receipt against GitHub
        id: verify
        continue-on-error: true
        shell: bash
        run: |
          gh auth setup-git --force --hostname github.com
          cd governance
          python -m governance_eval verify-receipt \
            --receipt ../artifacts/supportability/supportability-delivery-receipt.json \
            --allow-current-run-pending \
            > ../artifacts/supportability/supportability-receipt-verification.json
      - name: Read delivery summary
        id: summary
        if: always()
        shell: bash
        env:
          AUTHORITY_OUTCOME: ${{ steps.merge_group_receipt.outcome }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          receipt_path = Path("artifacts/supportability/supportability-delivery-receipt.json")
          verify_path = Path("artifacts/supportability/supportability-receipt-verification.json")
          receipt = json.loads(receipt_path.read_text(encoding="utf-8")) if receipt_path.exists() else {"owner_status": "RED", "errors": ["delivery receipt missing"]}
          verify_text = verify_path.read_text(encoding="utf-8").strip() if verify_path.exists() else ""
          verification = json.loads(verify_text) if verify_text else {"owner_status": "RED", "errors": ["receipt verification missing"]}
          authority_path = Path("artifacts/supportability/governance-merge-group-receipt.json")
          authority_required = bool(__import__("os").environ["MERGE_GROUP_SHA"])
          authority_status = (
              "GREEN"
              if not authority_required
              or (
                  __import__("os").environ["AUTHORITY_OUTCOME"] == "success"
                  and authority_path.exists()
              )
              else "RED"
          )
          owner_status = "GREEN" if receipt.get("owner_status") == "GREEN" and verification.get("owner_status") == "GREEN" and authority_status == "GREEN" else "RED"
          def emit(name, value):
              text = str(value).replace("\r", " ").replace("\n", " ")
              print(f"{name}={text}")
          emit("owner_status", owner_status)
          emit("receipt_status", receipt.get("owner_status", "RED"))
          emit("verification_status", verification.get("owner_status", "RED"))
          emit("authority_status", authority_status)
          emit("receipt_errors", "; ".join((receipt.get("errors") or [])[:5]))
          emit("verification_errors", "; ".join((verification.get("errors") or [])[:5]))
          PY
      - name: Upload delivery receipt
        id: upload
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: ${{ env.RECEIPT_ARTIFACT_NAME }}
          path: artifacts/supportability/*
          retention-days: 90
      - name: Write job summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Delivery Receipt"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Commit SHA | \`${TARGET_HEAD_SHA}\` |"
            echo "| Owner status | \`${{ steps.summary.outputs.owner_status }}\` |"
            echo "| Receipt generation | \`${{ steps.summary.outputs.receipt_status }}\` |"
             echo "| Remote audit | \`${{ steps.summary.outputs.verification_status }}\` |"
            echo "| Merge-group authority | \`${{ steps.summary.outputs.authority_status }}\` |"
            echo "| Receipt errors | \`${{ steps.summary.outputs.receipt_errors }}\` |"
            echo "| Remote audit errors | \`${{ steps.summary.outputs.verification_errors }}\` |"
            echo "| Source evidence artifact | \`${SUPPORTABILITY_ARTIFACT_NAME}\` |"
            echo "| Source evidence artifact ID | \`${{ steps.supportability_artifact.outputs.id }}\` |"
            echo "| Source evidence artifact digest | \`${{ steps.supportability_artifact.outputs.digest }}\` |"
            echo "| Candidate evidence artifact ID | \`${CANDIDATE_SUPPORTABILITY_ARTIFACT_ID}\` |"
            echo "| Candidate evidence artifact digest | \`${CANDIDATE_SUPPORTABILITY_ARTIFACT_DIGEST}\` |"
            echo "| Artifact name | \`${RECEIPT_ARTIFACT_NAME}\` |"
            echo "| Artifact ID | \`${{ steps.upload.outputs.artifact-id }}\` |"
            echo "| Artifact digest | \`${{ steps.upload.outputs.artifact-digest }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Fail closed on RED delivery receipt
        if: always() && steps.summary.outputs.owner_status != 'GREEN'
        shell: bash
        run: |
          echo "Delivery receipt is RED"
          exit 1
