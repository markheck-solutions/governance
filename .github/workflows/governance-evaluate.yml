name: Governance Target Evaluation

on:
  workflow_call:
    inputs:
      target-repository-url:
        required: true
        type: string
      target-base-sha:
        required: true
        type: string
      target-head-sha:
        required: true
        type: string
      target-merge-sha:
        required: false
        type: string
        default: ""
      target-pack-path:
        required: true
        type: string
      governance-ref:
        required: true
        type: string
      revision-mode:
        required: true
        type: string
      target-pr-number:
        required: false
        type: string
        default: ""
      artifact-name:
        required: false
        type: string
        default: governance-target-evaluation

permissions:
  contents: read

jobs:
  evaluate:
    name: Non-blocking target shadow evaluation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TARGET_REPOSITORY_URL: ${{ inputs.target-repository-url }}
      TARGET_BASE_SHA: ${{ inputs.target-base-sha }}
      TARGET_HEAD_SHA: ${{ inputs.target-head-sha }}
      TARGET_MERGE_SHA: ${{ inputs.target-merge-sha }}
      TARGET_PACK_PATH: ${{ inputs.target-pack-path }}
      GOVERNANCE_CHECKOUT_REF: ${{ inputs.governance-ref }}
      REVISION_MODE: ${{ inputs.revision-mode }}
      TARGET_PR_NUMBER: ${{ inputs.target-pr-number }}
      ARTIFACT_NAME: ${{ inputs.artifact-name }}
    steps:
      - name: Checkout governance evaluator
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          repository: markheck-solutions/governance
          ref: ${{ inputs.governance-ref }}
          path: governance
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
      - name: Validate workflow inputs
        shell: bash
        run: |
          python - <<'PY'
          import os
          import re
          import sys

          pack = os.environ["TARGET_PACK_PATH"]
          sha_re = re.compile(r"^[0-9a-f]{40}$")
          pack_re = re.compile(r"^[A-Za-z0-9_./-]+\.json$")
          artifact_re = re.compile(r"^[A-Za-z0-9_.-]{1,120}$")
          mode = os.environ["REVISION_MODE"]
          if mode not in {"HISTORICAL_FIXED", "SAFE_FIXED", "CANDIDATE_DYNAMIC"}:
              print("Invalid revision mode", file=sys.stderr)
              raise SystemExit(64)
          if not pack_re.fullmatch(pack) or ".." in pack.split("/"):
              print("Invalid target pack path", file=sys.stderr)
              raise SystemExit(64)
          if not sha_re.fullmatch(os.environ["TARGET_BASE_SHA"]):
              print("Invalid target base SHA", file=sys.stderr)
              raise SystemExit(64)
          if not sha_re.fullmatch(os.environ["TARGET_HEAD_SHA"]):
              print("Invalid target head SHA", file=sys.stderr)
              raise SystemExit(64)
          merge_sha = os.environ.get("TARGET_MERGE_SHA", "")
          if merge_sha and not sha_re.fullmatch(merge_sha):
              print("Invalid target merge SHA", file=sys.stderr)
              raise SystemExit(64)
          if not sha_re.fullmatch(os.environ["GOVERNANCE_CHECKOUT_REF"]):
              print("Invalid governance ref", file=sys.stderr)
              raise SystemExit(64)
          if not artifact_re.fullmatch(os.environ["ARTIFACT_NAME"]):
              print("Invalid artifact name", file=sys.stderr)
              raise SystemExit(64)
          pr_number = os.environ.get("TARGET_PR_NUMBER", "")
          if pr_number and not re.fullmatch(r"[1-9][0-9]{0,9}", pr_number):
              print("Invalid target PR number", file=sys.stderr)
              raise SystemExit(64)
          PY
      - name: Validate governance-owned target pack
        shell: bash
        run: |
          cd governance
          python -m governance_eval validate-target-request \
            --pack "$TARGET_PACK_PATH" \
            --repository-url "$TARGET_REPOSITORY_URL" \
            --base-sha "$TARGET_BASE_SHA" \
            --head-sha "$TARGET_HEAD_SHA" \
            --merge-sha "$TARGET_MERGE_SHA" \
            --revision-mode "$REVISION_MODE"
      - name: Run target evaluation
        timeout-minutes: 15
        shell: bash
        run: |
          cd governance
          args=(
            python -m governance_eval evaluate-target
            --pack "$TARGET_PACK_PATH"
            --base-sha "$TARGET_BASE_SHA"
            --head-sha "$TARGET_HEAD_SHA"
            --merge-sha "$TARGET_MERGE_SHA"
            --repository-url "$TARGET_REPOSITORY_URL"
            --revision-mode "$REVISION_MODE"
            --governance-owned-pack
            --artifacts-dir artifacts/target
          )
          if [[ -n "$TARGET_PR_NUMBER" ]]; then
            args+=(--target-pr-number "$TARGET_PR_NUMBER")
          fi
          "${args[@]}"
      - name: Read target summary
        id: target
        if: always()
        shell: bash
        run: |
          cd governance
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          path = Path("artifacts/target/target-evaluation-latest.json")
          if not path.exists():
              print("decision=SHADOW_BLOCK_TECHNICAL")
              print("case_count=0")
              print("passed=0")
              print("failed=0")
              print("business=0")
              print("unknown_required=0")
              print("unknown_advisory=0")
              print("revision_mode=UNKNOWN")
              print("target_pr_number=")
              print("errors=missing artifact")
              print("content_hash=MISSING")
              raise SystemExit(0)

          data = json.loads(path.read_text(encoding="utf-8"))
          counts = data["case_counts"]
          print(f"decision={data['real_target_shadow_decision']}")
          print(f"case_count={counts['behavior_case_count']}")
          print(f"passed={counts['behavior_cases_passed']}")
          print(f"failed={counts['behavior_cases_failed']}")
          print(f"business={counts.get('behavior_cases_business_ambiguous', 0)}")
          measurements = data.get("structural_measurements", {})
          print(f"unknown_required={measurements.get('unknown_required_count', 0)}")
          print(f"unknown_advisory={measurements.get('unknown_advisory_count', 0)}")
          print(f"revision_mode={data.get('revision_mode', 'UNKNOWN')}")
          print(f"target_pr_number={data.get('target_pr_number') or ''}")
          print(f"errors={'; '.join(data['acceptance_errors'][:5])}")
          print(f"content_hash={data['artifact_content_hash']}")
          PY
      - name: Upload target JSON
        id: upload
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: governance/artifacts/target/*.json
          retention-days: 90
      - name: Write job summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Governance Target Evaluation"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Governance commit SHA | \`${GOVERNANCE_CHECKOUT_REF}\` |"
            echo "| Target repository | \`${TARGET_REPOSITORY_URL}\` |"
            echo "| Target base SHA | \`${TARGET_BASE_SHA}\` |"
            echo "| Target head SHA | \`${TARGET_HEAD_SHA}\` |"
            echo "| Target PR number | \`${{ steps.target.outputs.target_pr_number }}\` |"
            echo "| Revision mode | \`${{ steps.target.outputs.revision_mode }}\` |"
            echo "| Shadow decision | \`${{ steps.target.outputs.decision }}\` |"
            echo "| Enforcement mode | \`NON_BLOCKING\` |"
            echo "| Behavior cases | \`${{ steps.target.outputs.passed }}/${{ steps.target.outputs.case_count }} passed; ${{ steps.target.outputs.failed }} failed; ${{ steps.target.outputs.business }} business ambiguous\` |"
            echo "| Unknown required measurements | \`${{ steps.target.outputs.unknown_required }}\` |"
            echo "| Unknown advisory measurements | \`${{ steps.target.outputs.unknown_advisory }}\` |"
            echo "| Acceptance errors | \`${{ steps.target.outputs.errors }}\` |"
            echo "| Artifact name | \`${ARTIFACT_NAME}\` |"
            echo "| Artifact ID | \`${{ steps.upload.outputs.artifact-id }}\` |"
            echo "| Artifact digest | \`${{ steps.upload.outputs.artifact-digest }}\` |"
            echo "| Artifact content hash | \`${{ steps.target.outputs.content_hash }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
