name: Supportability Gate

on:
  workflow_call:
    inputs:
      target-base-sha:
        required: true
        type: string
      target-head-sha:
        required: true
        type: string
      target-pr-number:
        required: true
        type: string
      config-path:
        required: false
        type: string
        default: .github/governance/supportability.yml
      artifact-name:
        required: false
        type: string
        default: supportability-gate-evidence
    outputs:
      owner-status:
        description: GREEN only when trusted planning, isolated execution, static analysis, and review pass.
        value: ${{ jobs.judge.outputs.owner-status }}
      artifact-id:
        description: Uploaded trusted supportability evidence artifact ID.
        value: ${{ jobs.judge.outputs.artifact-id }}
      artifact-digest:
        description: Uploaded trusted supportability evidence artifact digest.
        value: ${{ jobs.judge.outputs.artifact-digest }}

permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  plan:
    name: Trusted Plan And Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      setup-commands: ${{ steps.matrix.outputs.setup_commands }}
      adapter: ${{ steps.matrix.outputs.adapter }}
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
      artifact-digest: ${{ steps.upload.outputs.artifact-digest }}
    env:
      TARGET_BASE_SHA: ${{ inputs.target-base-sha }}
      TARGET_HEAD_SHA: ${{ inputs.target-head-sha }}
      TARGET_PR_NUMBER: ${{ inputs.target-pr-number }}
      CONFIG_PATH: ${{ inputs.config-path }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout exact target revision for read-only planning
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          repository: ${{ github.repository }}
          ref: ${{ inputs.target-head-sha }}
          fetch-depth: 0
          path: target
          persist-credentials: false
      - name: Checkout trusted evaluator from reusable workflow identity
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: governance
          persist-credentials: false
      - name: Set up trusted Python runtime
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
      - name: Verify caller PR identity
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import subprocess
          import sys

          sha = re.compile(r"^[0-9a-f]{40}$")
          if not sha.fullmatch(os.environ["TARGET_BASE_SHA"]) or not sha.fullmatch(os.environ["TARGET_HEAD_SHA"]):
              raise SystemExit("target revisions must be exact 40-character SHAs")
          if not re.fullmatch(r"[1-9][0-9]{0,9}", os.environ["TARGET_PR_NUMBER"]):
              raise SystemExit("target PR number invalid")
          path = os.environ["CONFIG_PATH"]
          if not re.fullmatch(r"[A-Za-z0-9_./-]+\.ya?ml", path) or ".." in path.split("/"):
              raise SystemExit("config path invalid")
          payload = json.loads(subprocess.check_output(
              ["gh", "api", f"repos/{os.environ['GITHUB_REPOSITORY']}/pulls/{os.environ['TARGET_PR_NUMBER']}"],
              text=True,
          ))
          if payload["base"]["sha"] != os.environ["TARGET_BASE_SHA"]:
              raise SystemExit("PR base SHA does not match requested base")
          if payload["head"]["sha"] != os.environ["TARGET_HEAD_SHA"]:
              raise SystemExit("PR head SHA does not match requested head")
          actual = subprocess.check_output(["git", "-C", "target", "rev-parse", "HEAD"], text=True).strip()
          if actual != os.environ["TARGET_HEAD_SHA"]:
              raise SystemExit("checked-out target HEAD mismatch")
          PY
      - name: Create trusted supportability execution plan
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/trusted-plan"
          cd governance
          python -m governance_eval trusted-workflow plan \
            --config "../target/${CONFIG_PATH}" \
            --target-repo ../target \
            --base-sha "$TARGET_BASE_SHA" \
            --head-sha "$TARGET_HEAD_SHA" \
            --workflow-repository "${{ job.workflow_repository }}" \
            --workflow-sha "${{ job.workflow_sha }}" \
            --repository-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" \
            --pr-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/pull/${TARGET_PR_NUMBER}" \
            --output "$RUNNER_TEMP/trusted-plan/supportability-plan.json"
      - name: Run trusted architecture fitness analysis
        shell: bash
        run: |
          cd governance
          python -m governance_eval architecture-gate \
            --config "../target/${CONFIG_PATH}" \
            --target-repo ../target \
            --base-sha "$TARGET_BASE_SHA" \
            --head-sha "$TARGET_HEAD_SHA" \
            --output-dir "$RUNNER_TEMP/trusted-plan"
      - name: Publish bounded execution matrix
        id: matrix
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          from pathlib import Path

          plan = json.loads((Path(os.environ["RUNNER_TEMP"]) / "trusted-plan/supportability-plan.json").read_text())
          print("matrix=" + json.dumps({"include": plan["execution"]["matrix"]}, separators=(",", ":")))
          print("setup_commands=" + json.dumps(plan["execution"]["setup_commands"], separators=(",", ":")))
          print("adapter=" + plan["execution"]["adapter"])
          PY
      - name: Upload trusted plan evidence
        id: upload
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: ${{ inputs.artifact-name }}-trusted-plan
          path: ${{ runner.temp }}/trusted-plan/*
          retention-days: 90

  execute:
    name: Untrusted Gate ${{ matrix.id }} ${{ matrix.gate }}
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    permissions:
      contents: read
    steps:
      # target only; no evaluator checkout
      - name: Checkout exact target revision
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          repository: ${{ github.repository }}
          ref: ${{ inputs.target-head-sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Set up adapter Python runtime
        if: ${{ needs.plan.outputs.adapter == 'python' }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
      - name: Execute untrusted target command
        shell: bash
        env:
          SETUP_COMMANDS_JSON: ${{ needs.plan.outputs.setup-commands }}
          TARGET_COMMAND: ${{ matrix.command }}
          TARGET_BASE_SHA: ${{ inputs.target-base-sha }}
          TARGET_HEAD_SHA: ${{ inputs.target-head-sha }}
          GH_TOKEN: ""
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess

          commands = [*json.loads(os.environ["SETUP_COMMANDS_JSON"]), os.environ["TARGET_COMMAND"]]
          for command in commands:
              completed = subprocess.run(command, shell=True)
              if completed.returncode:
                  raise SystemExit(completed.returncode)
          PY

  judge:
    name: Supportability Gate
    needs:
      - plan
      - execute
    if: ${{ always() && needs.plan.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      owner-status: ${{ steps.summary.outputs.owner_status }}
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
      artifact-digest: ${{ steps.upload.outputs.artifact-digest }}
    env:
      TARGET_HEAD_SHA: ${{ inputs.target-head-sha }}
      TARGET_PR_NUMBER: ${{ inputs.target-pr-number }}
      CONFIG_PATH: ${{ inputs.config-path }}
      PLAN_ARTIFACT_ID: ${{ needs.plan.outputs.artifact-id }}
      EXECUTION_RESULT: ${{ needs.execute.result }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout fresh trusted evaluator
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: governance
          persist-credentials: false
      - name: Checkout target config only for trusted review
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          repository: ${{ github.repository }}
          ref: ${{ inputs.target-head-sha }}
          path: target
          persist-credentials: false
      - name: Set up trusted Python runtime
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
      - name: Download trusted plan artifact
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/trusted" "$RUNNER_TEMP/evidence"
          gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/${PLAN_ARTIFACT_ID}/zip" > "$RUNNER_TEMP/plan.zip"
          unzip -q "$RUNNER_TEMP/plan.zip" -d "$RUNNER_TEMP/trusted"
      - name: Finalize isolated command evidence
        id: finalize
        continue-on-error: true
        shell: bash
        run: |
          cd governance
          python -m governance_eval trusted-workflow finalize \
            --plan "$RUNNER_TEMP/trusted/supportability-plan.json" \
            --execution-result "$EXECUTION_RESULT" \
            --workflow-repository "${{ job.workflow_repository }}" \
            --workflow-sha "${{ job.workflow_sha }}" \
            --output-dir "$RUNNER_TEMP/evidence"
      - name: Verify latest structured AI review evidence
        id: review
        continue-on-error: true
        shell: bash
        run: |
          cd governance
          python -m governance_eval copilot-review-gate \
            --config "../target/${CONFIG_PATH}" \
            --head-sha "$TARGET_HEAD_SHA" \
            --repo "$GITHUB_REPOSITORY" \
            --pr "$TARGET_PR_NUMBER" \
            --output-dir "$RUNNER_TEMP/evidence"
      - name: Copy trusted architecture evidence
        shell: bash
        run: cp "$RUNNER_TEMP/trusted/architecture-gate-result."* "$RUNNER_TEMP/evidence/"
      - name: Read trusted supportability summary
        id: summary
        if: always()
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          from pathlib import Path

          root = Path(os.environ["RUNNER_TEMP"]) / "evidence"
          def load(name):
              path = root / name
              return json.loads(path.read_text()) if path.exists() else {"owner_status": "RED"}
          gate = load("supportability-gate-result.json")
          architecture = load("architecture-gate-result.json")
          review = load("copilot-review-gate-result.json")
          status = "GREEN" if all(item.get("owner_status") == "GREEN" for item in (gate, architecture, review)) else "RED"
          print(f"owner_status={status}")
          PY
      - name: Upload trusted supportability evidence
        id: upload
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ runner.temp }}/evidence/*
          retention-days: 90
      - name: Fail closed on RED supportability evidence
        if: ${{ always() && steps.summary.outputs.owner_status != 'GREEN' }}
        shell: bash
        run: |
          echo "Trusted supportability evidence is RED"
          exit 1
