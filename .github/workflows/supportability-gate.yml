name: Supportability Gate

on:
  workflow_call:
    inputs:
      target-repository:
        required: true
        type: string
      target-repository-url:
        required: true
        type: string
      target-base-sha:
        required: true
        type: string
      target-head-sha:
        required: true
        type: string
      target-pr-number:
        required: true
        type: string
      target-pr-url:
        required: true
        type: string
      target-head-repository-id:
        required: true
        type: string
      target-pr-head-sha:
        required: true
        type: string
      target-pr-base-sha:
        required: true
        type: string
      merge-group-ref:
        required: true
        type: string
      merge-group-sha:
        required: true
        type: string
      merge-group-event-id:
        required: true
        type: string
      event-created-at:
        required: true
        type: string
      review-window-started-at:
        required: true
        type: string
      governance-ref:
        required: true
        type: string
      request-outcome:
        required: true
        type: string
      request-transport-command-json:
        required: true
        type: string
      request-transport-started-at:
        required: true
        type: string
      request-transport-completed-at:
        required: true
        type: string
      request-transport-timeout-seconds:
        required: true
        type: string
      request-transport-timed-out:
        required: true
        type: string
      request-transport-exit-code:
        required: true
        type: string
      request-transport-error-sha256:
        required: false
        type: string
        default: ""
      request-response-validation-error-sha256:
        required: false
        type: string
        default: ""
      request-comment-id:
        required: false
        type: string
        default: ""
      request-comment-created-at:
        required: false
        type: string
        default: ""
      config-path:
        required: false
        type: string
        default: .github/governance/supportability.yml
      artifact-name:
        required: false
        type: string
        default: supportability-gate-evidence
    outputs:
      owner-status:
        description: GREEN when deterministic supportability and Codex evidence gates pass.
        value: ${{ jobs.supportability.outputs.owner-status }}
      artifact-id:
        description: Uploaded supportability evidence artifact ID.
        value: ${{ jobs.supportability.outputs.artifact-id }}
      artifact-digest:
        description: Uploaded supportability evidence artifact digest.
        value: ${{ jobs.supportability.outputs.artifact-digest }}

permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  supportability:
    name: Supportability Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      owner-status: ${{ steps.summary.outputs.owner_status }}
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
      artifact-digest: ${{ steps.upload.outputs.artifact-digest }}
    env:
      TARGET_REPOSITORY: ${{ inputs.target-repository }}
      TARGET_REPOSITORY_URL: ${{ inputs.target-repository-url }}
      TARGET_BASE_SHA: ${{ inputs.target-base-sha }}
      TARGET_HEAD_SHA: ${{ inputs.target-head-sha }}
      TARGET_PR_NUMBER: ${{ inputs.target-pr-number }}
      TARGET_PR_URL: ${{ inputs.target-pr-url }}
      TARGET_HEAD_REPOSITORY_ID: ${{ inputs.target-head-repository-id }}
      TARGET_PR_HEAD_SHA: ${{ inputs.target-pr-head-sha }}
      TARGET_PR_BASE_SHA: ${{ inputs.target-pr-base-sha }}
      MERGE_GROUP_REF: ${{ inputs.merge-group-ref }}
      MERGE_GROUP_SHA: ${{ inputs.merge-group-sha }}
      MERGE_GROUP_EVENT_ID: ${{ inputs.merge-group-event-id }}
      EVENT_CREATED_AT: ${{ inputs.event-created-at }}
      REVIEW_WINDOW_STARTED_AT: ${{ inputs.review-window-started-at }}
      GOVERNANCE_REF: ${{ inputs.governance-ref }}
      REQUEST_WORKFLOW_REF: ${{ github.workflow_ref }}
      REQUEST_WORKFLOW_SHA: ${{ github.workflow_sha }}
      REQUEST_EVENT_NAME: ${{ github.event_name }}
      REQUEST_EVENT_ACTION: ${{ github.event.action }}
      REQUEST_RUN_ID: ${{ github.run_id }}
      REQUEST_RUN_ATTEMPT: ${{ github.run_attempt }}
      REQUEST_REPOSITORY_ID: ${{ github.repository_id }}
      REQUEST_OUTCOME: ${{ inputs.request-outcome }}
      REQUEST_TRANSPORT_COMMAND_JSON: ${{ inputs.request-transport-command-json }}
      REQUEST_TRANSPORT_STARTED_AT: ${{ inputs.request-transport-started-at }}
      REQUEST_TRANSPORT_COMPLETED_AT: ${{ inputs.request-transport-completed-at }}
      REQUEST_TRANSPORT_TIMEOUT_SECONDS: ${{ inputs.request-transport-timeout-seconds }}
      REQUEST_TRANSPORT_TIMED_OUT: ${{ inputs.request-transport-timed-out }}
      REQUEST_TRANSPORT_EXIT_CODE: ${{ inputs.request-transport-exit-code }}
      REQUEST_TRANSPORT_ERROR_SHA256: ${{ inputs.request-transport-error-sha256 }}
      REQUEST_RESPONSE_VALIDATION_ERROR_SHA256: ${{ inputs.request-response-validation-error-sha256 }}
      REQUEST_COMMENT_ID: ${{ inputs.request-comment-id }}
      REQUEST_COMMENT_CREATED_AT: ${{ inputs.request-comment-created-at }}
      CONFIG_PATH: ${{ inputs.config-path }}
      ARTIFACT_NAME: ${{ inputs.artifact-name }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout target repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          repository: ${{ inputs.target-repository }}
          ref: ${{ inputs.target-head-sha }}
          fetch-depth: 0
          path: target
          persist-credentials: false
      - name: Checkout governance evaluator
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          repository: markheck-solutions/governance
          ref: ${{ inputs.governance-ref }}
          path: governance
          persist-credentials: false
      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12.13"
      - name: Validate workflow inputs
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import sys
          from datetime import datetime

          sha_re = re.compile(r"^[0-9a-f]{40}$")
          ref_re = re.compile(r"^[0-9a-f]{40}$")
          artifact_re = re.compile(r"^[A-Za-z0-9_.-]{1,120}$")
          config_re = re.compile(r"^[A-Za-z0-9_./-]+\.ya?ml$")
          positive_int_re = re.compile(r"^[1-9][0-9]*$")
          exit_code_re = re.compile(r"^(0|[1-9][0-9]{0,2})$")
          digest_re = re.compile(r"^sha256:[0-9a-f]{64}$")
          timestamp_re = re.compile(
              r"^[0-9]{4}-[0-9]{2}-[0-9]{2}T"
              r"[0-9]{2}:[0-9]{2}:[0-9]{2}Z$"
          )

          def valid_timestamp(value: str) -> bool:
              if not timestamp_re.fullmatch(value):
                  return False
              try:
                  datetime.strptime(value, "%Y-%m-%dT%H:%M:%SZ")
              except ValueError:
                  return False
              return True

          if not sha_re.fullmatch(os.environ["TARGET_BASE_SHA"]):
              print("Invalid target base SHA", file=sys.stderr)
              raise SystemExit(64)
          if not sha_re.fullmatch(os.environ["TARGET_HEAD_SHA"]):
              print("Invalid target head SHA", file=sys.stderr)
              raise SystemExit(64)
          if not sha_re.fullmatch(os.environ["TARGET_PR_HEAD_SHA"]):
              print("Invalid pull-request head SHA", file=sys.stderr)
              raise SystemExit(64)
          if not sha_re.fullmatch(os.environ["TARGET_PR_BASE_SHA"]):
              print("Invalid pull-request base SHA", file=sys.stderr)
              raise SystemExit(64)
          if not ref_re.fullmatch(os.environ["GOVERNANCE_REF"]):
              print("Governance ref must be an exact commit SHA", file=sys.stderr)
              raise SystemExit(64)
          if not re.fullmatch(r"[1-9][0-9]{0,9}", os.environ["TARGET_PR_NUMBER"]):
              print("Invalid target PR number", file=sys.stderr)
              raise SystemExit(64)
          if not artifact_re.fullmatch(os.environ["ARTIFACT_NAME"]):
              print("Invalid artifact name", file=sys.stderr)
              raise SystemExit(64)
          config_path = os.environ["CONFIG_PATH"]
          if not config_re.fullmatch(config_path) or ".." in config_path.split("/"):
              print("Invalid config path", file=sys.stderr)
              raise SystemExit(64)
          expected_workflow_ref = (
              f"{os.environ['TARGET_REPOSITORY']}/.github/workflows/"
              "supportability-enforcement.yml@refs/heads/main"
          )
          if os.environ["REQUEST_WORKFLOW_REF"] != expected_workflow_ref:
              print("Invalid request workflow ref", file=sys.stderr)
              raise SystemExit(64)
          if not sha_re.fullmatch(os.environ["REQUEST_WORKFLOW_SHA"]):
              print("Invalid request workflow SHA", file=sys.stderr)
              raise SystemExit(64)
          if os.environ["REQUEST_EVENT_NAME"] not in {
              "pull_request_target", "merge_group"
          }:
              print("Invalid request event", file=sys.stderr)
              raise SystemExit(64)
          allowed_actions = {
              "opened", "reopened", "synchronize", "ready_for_review",
              "checks_requested",
          }
          if os.environ["REQUEST_EVENT_ACTION"] not in allowed_actions:
              print("Invalid request event action", file=sys.stderr)
              raise SystemExit(64)
          if os.environ["REQUEST_EVENT_NAME"] == "merge_group":
              if (
                  os.environ["REQUEST_EVENT_ACTION"] != "checks_requested"
                  or os.environ["MERGE_GROUP_SHA"] != os.environ["TARGET_HEAD_SHA"]
                  or os.environ["TARGET_PR_BASE_SHA"] != os.environ["TARGET_BASE_SHA"]
                  or not sha_re.fullmatch(os.environ["MERGE_GROUP_SHA"])
                  or not os.environ["MERGE_GROUP_REF"].startswith(
                      "gh-readonly-queue/"
                  )
                  or not re.fullmatch(
                      r"merge-group:[1-9][0-9]*:[1-9][0-9]*",
                      os.environ["MERGE_GROUP_EVENT_ID"],
                  )
                  or not valid_timestamp(os.environ["EVENT_CREATED_AT"])
              ):
                  print("Invalid merge-group authority inputs", file=sys.stderr)
                  raise SystemExit(64)
          elif (
              os.environ["TARGET_PR_HEAD_SHA"] != os.environ["TARGET_HEAD_SHA"]
              or os.environ["TARGET_PR_BASE_SHA"] != os.environ["TARGET_BASE_SHA"]
              or os.environ["MERGE_GROUP_SHA"]
              or os.environ["MERGE_GROUP_REF"]
              or os.environ["MERGE_GROUP_EVENT_ID"]
          ):
              print("Invalid pull-request authority inputs", file=sys.stderr)
              raise SystemExit(64)
          if not positive_int_re.fullmatch(os.environ["REQUEST_RUN_ID"]):
              print("Invalid request run ID", file=sys.stderr)
              raise SystemExit(64)
          if os.environ["REQUEST_RUN_ATTEMPT"] != "1":
              print("Request must come from run attempt 1", file=sys.stderr)
              raise SystemExit(64)
          if not positive_int_re.fullmatch(os.environ["REQUEST_REPOSITORY_ID"]):
              print("Invalid request repository ID", file=sys.stderr)
              raise SystemExit(64)
          outcome = os.environ["REQUEST_OUTCOME"]
          command_json = os.environ["REQUEST_TRANSPORT_COMMAND_JSON"]
          started_at = os.environ["REQUEST_TRANSPORT_STARTED_AT"]
          completed_at = os.environ["REQUEST_TRANSPORT_COMPLETED_AT"]
          timeout_seconds = os.environ["REQUEST_TRANSPORT_TIMEOUT_SECONDS"]
          timed_out_text = os.environ["REQUEST_TRANSPORT_TIMED_OUT"]
          exit_code_text = os.environ["REQUEST_TRANSPORT_EXIT_CODE"]
          error_digest = os.environ["REQUEST_TRANSPORT_ERROR_SHA256"]
          response_error_digest = os.environ[
              "REQUEST_RESPONSE_VALIDATION_ERROR_SHA256"
          ]
          comment_id = os.environ["REQUEST_COMMENT_ID"]
          comment_created_at = os.environ["REQUEST_COMMENT_CREATED_AT"]
          if exit_code_text == "":
              exit_code = None
          elif not exit_code_re.fullmatch(exit_code_text):
              print("Invalid request transport exit code", file=sys.stderr)
              raise SystemExit(64)
          else:
              exit_code = int(exit_code_text)
              if exit_code > 255:
                  print("Invalid request transport exit code", file=sys.stderr)
                  raise SystemExit(64)
          body = (
              "@codex review\n\nGovernance review request for exact head "
              f"`{os.environ['TARGET_HEAD_SHA']}`."
          )
          expected_command = [
              "gh",
              "api",
              "--method",
              "POST",
              f"repos/{os.environ['TARGET_REPOSITORY']}/issues/"
              f"{os.environ['TARGET_PR_NUMBER']}/comments",
              "-f",
              f"body={body}",
          ]
          try:
              command = json.loads(command_json)
          except json.JSONDecodeError:
              command = None
          canonical_command = json.dumps(expected_command, separators=(",", ":"))
          transport_valid = (
              command == expected_command
              and command_json == canonical_command
              and valid_timestamp(started_at)
              and valid_timestamp(completed_at)
              and datetime.strptime(completed_at, "%Y-%m-%dT%H:%M:%SZ")
              >= datetime.strptime(started_at, "%Y-%m-%dT%H:%M:%SZ")
              and timeout_seconds == "30"
              and timed_out_text in {"true", "false"}
              and (timed_out_text != "true" or exit_code == 124)
          )
          if outcome == "POSTED":
              valid = (
                  transport_valid
                  and exit_code == 0
                  and timed_out_text == "false"
                  and error_digest == ""
                  and response_error_digest == ""
                  and positive_int_re.fullmatch(comment_id)
                  and valid_timestamp(comment_created_at)
              )
          elif outcome == "TRANSPORT_UNAVAILABLE":
              valid = (
                  transport_valid
                  and (exit_code is None or exit_code != 0)
                  and digest_re.fullmatch(error_digest)
                  and response_error_digest == ""
                  and comment_id == ""
                  and comment_created_at == ""
              )
          elif outcome == "RESPONSE_INVALID":
              valid = (
                  transport_valid
                  and exit_code == 0
                  and timed_out_text == "false"
                  and error_digest == ""
                  and digest_re.fullmatch(response_error_digest)
                  and comment_id == ""
                  and comment_created_at == ""
              )
          else:
              valid = False
          if not valid:
            print("Invalid automatic request receipt", file=sys.stderr)
            raise SystemExit(64)
          PY
      - name: Provision pinned governance toolchain
        id: toolchain
        uses: ./governance/.github/actions/setup-governance-toolchain
        with:
          context-kind: SUPPORTABILITY_EVALUATION
          governance-root: governance
          base-sha: ${{ inputs.governance-ref }}
          evaluator-sha: ${{ inputs.governance-ref }}
          python-path: ${{ steps.setup-python.outputs.python-path }}
          repository: ${{ github.repository }}
          repository-id: ${{ github.repository_id }}
          head-repository-id: ${{ inputs.target-head-repository-id }}
          event-name: ${{ github.event_name }}
          event-action: ${{ github.event.action }}
          target-base-sha: ${{ inputs.target-base-sha }}
          target-head-sha: ${{ inputs.target-head-sha }}
          pull-request-number: ${{ inputs.target-pr-number }}
          workflow-ref: ${{ github.workflow_ref }}
          workflow-sha: ${{ github.workflow_sha }}
          run-id: ${{ github.run_id }}
          run-attempt: ${{ github.run_attempt }}
          expected-artifact-name: ${{ inputs.artifact-name }}
      - name: Bind validated AI-review supportability config
        id: bind_ai_config
        shell: bash
        env:
          GH_TOKEN: ""
        run: |
          cd governance
          "${{ steps.toolchain.outputs.python-path }}" - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          import subprocess
          from pathlib import Path

          from governance_eval.codex_review_gate import bind_supportability_config

          target_root = Path("../target")
          target_head = subprocess.run(
              ["git", "rev-parse", "HEAD"],
              cwd=target_root,
              check=True,
              capture_output=True,
              text=True,
              timeout=10,
          ).stdout.strip()
          if target_head != os.environ["TARGET_HEAD_SHA"]:
              raise SystemExit("Target checkout HEAD does not match TARGET_HEAD_SHA")
          subprocess.run(
              [
                  "git",
                  "ls-files",
                  "--error-unmatch",
                  "--",
                  os.environ["CONFIG_PATH"],
              ],
              cwd=target_root,
              check=True,
              capture_output=True,
              text=True,
              timeout=10,
          )
          source_path = target_root / os.environ["CONFIG_PATH"]
          source_path.resolve(strict=True).relative_to(target_root.resolve(strict=True))
          bound_path = (
              Path(os.environ["RUNNER_TEMP"])
              / "governance-ai-review-supportability.yml"
          )
          binding = bind_supportability_config(
              source_path=source_path,
              bound_path=bound_path,
              repository=os.environ["TARGET_REPOSITORY"],
              target_head_sha=os.environ["TARGET_HEAD_SHA"],
              source_relative_path=os.environ["CONFIG_PATH"],
          )
          print(f"bound-config-path={binding['bound_config_path']}")
          print(f"content-sha256={binding['content_sha256']}")
          print(f"binding-sha256={binding['binding_sha256']}")
          PY
      - name: Validate supportability config
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ""
        run: |
          cd governance
          "${{ steps.toolchain.outputs.python-path }}" -m governance_eval supportability-config --config "../target/${CONFIG_PATH}"
      - name: Run configured supportability gates
        id: gate
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ""
          GOVERNANCE_TOOLCHAIN_PYTHON_PATH: ${{ steps.toolchain.outputs.python-path }}
          GOVERNANCE_TOOLCHAIN_BIN_PATH: ${{ steps.toolchain.outputs.bin-path }}
          GOVERNANCE_TOOLCHAIN_RECEIPT_PATH: ${{ steps.toolchain.outputs.receipt-path }}
          GOVERNANCE_TOOLCHAIN_LOCK_SHA256: ${{ steps.toolchain.outputs.lock-sha256 }}
          GOVERNANCE_TOOLCHAIN_RECEIPT_FILE_SHA256: ${{ steps.toolchain.outputs.receipt-file-sha256 }}
        run: |
          cd governance
          "${{ steps.toolchain.outputs.python-path }}" -m governance_eval supportability-gate \
            --config "../target/${CONFIG_PATH}" \
            --target-repo ../target \
            --base-sha "$TARGET_BASE_SHA" \
            --head-sha "$TARGET_HEAD_SHA" \
            --repository-url "$TARGET_REPOSITORY_URL" \
            --pr-url "$TARGET_PR_URL" \
            --output-dir ../target/artifacts/supportability
      - name: Run approved architecture fitness gate
        id: architecture
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ""
        run: |
          cd governance
          python -m governance_eval architecture-gate \
            --config "../target/${CONFIG_PATH}" \
            --target-repo ../target \
            --base-sha "$TARGET_BASE_SHA" \
            --head-sha "$TARGET_HEAD_SHA" \
            --output-dir ../target/artifacts/supportability
      - name: Reconcile Codex review evidence
        id: ai-review
        continue-on-error: true
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cd governance
          receipt_args=(
            --request-workflow-ref "$REQUEST_WORKFLOW_REF"
            --request-workflow-sha "$REQUEST_WORKFLOW_SHA"
            --request-event-name "$REQUEST_EVENT_NAME"
            --request-event-action "$REQUEST_EVENT_ACTION"
            --request-run-id "$REQUEST_RUN_ID"
            --request-run-attempt "$REQUEST_RUN_ATTEMPT"
            --request-repository-id "$REQUEST_REPOSITORY_ID"
            --request-outcome "$REQUEST_OUTCOME"
            --request-transport-command-json "$REQUEST_TRANSPORT_COMMAND_JSON"
            --request-transport-started-at "$REQUEST_TRANSPORT_STARTED_AT"
            --request-transport-completed-at "$REQUEST_TRANSPORT_COMPLETED_AT"
            --request-transport-timeout-seconds "$REQUEST_TRANSPORT_TIMEOUT_SECONDS"
            --request-transport-timed-out "$REQUEST_TRANSPORT_TIMED_OUT"
            --request-transport-exit-code "$REQUEST_TRANSPORT_EXIT_CODE"
          )
          if [[ "$REQUEST_OUTCOME" == "POSTED" ]]; then
            receipt_args+=(
              --request-comment-id "$REQUEST_COMMENT_ID"
              --request-comment-created-at "$REQUEST_COMMENT_CREATED_AT"
            )
          elif [[ "$REQUEST_OUTCOME" == "TRANSPORT_UNAVAILABLE" ]]; then
            receipt_args+=(
              --request-transport-error-sha256 "$REQUEST_TRANSPORT_ERROR_SHA256"
            )
          else
            receipt_args+=(
              --request-response-validation-error-sha256 "$REQUEST_RESPONSE_VALIDATION_ERROR_SHA256"
            )
          fi
          "${{ steps.toolchain.outputs.python-path }}" -m governance_eval.codex_review_gate \
            --config "${{ steps.bind_ai_config.outputs.bound-config-path }}" \
            --config-source-path "$CONFIG_PATH" \
            --config-binding-digest "${{ steps.bind_ai_config.outputs.binding-sha256 }}" \
            --repo "$TARGET_REPOSITORY" \
            --pr "$TARGET_PR_NUMBER" \
            --base-sha "$TARGET_BASE_SHA" \
            --head-sha "$TARGET_HEAD_SHA" \
            --governance-sha "$GOVERNANCE_REF" \
            --review-window-started-at "$REVIEW_WINDOW_STARTED_AT" \
            --output-dir ../target/artifacts/supportability \
            "${receipt_args[@]}"
      - name: Read supportability summary
        id: summary
        if: always()
        shell: bash
        run: |
          summary_python="${{ steps.toolchain.outputs.python-path }}"
          if [[ -z "$summary_python" ]]; then
            summary_python="${{ steps.setup-python.outputs.python-path }}"
          fi
          "$summary_python" - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          gate_path = Path("target/artifacts/supportability/supportability-gate-result.json")
          architecture_path = Path("target/artifacts/supportability/architecture-gate-result.json")
          architecture_md_path = Path("target/artifacts/supportability/architecture-gate-result.md")
          ai_path = Path("target/artifacts/supportability/ai-review-gate-result.json")
          gate = json.loads(gate_path.read_text(encoding="utf-8")) if gate_path.exists() else {"owner_status": "RED", "errors": ["supportability gate result missing"], "changed_files": []}
          architecture = json.loads(architecture_path.read_text(encoding="utf-8")) if architecture_path.exists() and architecture_md_path.exists() else {"owner_status": "RED", "errors": ["architecture gate evidence missing"]}
          ai_review = json.loads(ai_path.read_text(encoding="utf-8")) if ai_path.exists() else {"owner_status": "RED", "observations": ["AI review gate result missing"]}
          architecture_green = (
              architecture.get("owner_status") == "GREEN"
              and architecture.get("gate_implementation") == "PASS"
              and architecture.get("repo_architecture_supportability") == "PASS"
              and architecture.get("architecture_behavior_proof") == "PASS"
              and architecture.get("enforcement_mode") == "block_all"
              and not architecture.get("violations")
              and not architecture.get("new_violations")
              and not architecture.get("known_debt_applied")
              and not architecture.get("expired_known_debt")
              and not architecture.get("errors")
          )
          owner_status = "GREEN" if gate.get("owner_status") == "GREEN" and architecture_green and ai_review.get("owner_status") == "GREEN" else "RED"
          def emit(name, value):
              text = str(value).replace("\r", " ").replace("\n", " ")
              print(f"{name}={text}")
          emit("owner_status", owner_status)
          emit("gate_status", gate.get("owner_status", "RED"))
          emit("architecture_status", architecture.get("owner_status", "RED"))
          emit("architecture_implementation", architecture.get("gate_implementation", "FAIL"))
          emit("repo_architecture_supportability", architecture.get("repo_architecture_supportability", "FAIL"))
          emit("architecture_behavior_proof", architecture.get("architecture_behavior_proof", "FAIL"))
          emit("architecture_violation_count", len(architecture.get("violations") or []))
          emit("architecture_new_violation_count", len(architecture.get("new_violations") or []))
          emit("architecture_known_debt_applied_count", len(architecture.get("known_debt_applied") or []))
          emit("architecture_expired_known_debt_count", len(architecture.get("expired_known_debt") or []))
          emit("ai_review_status", ai_review.get("owner_status", "RED"))
          emit("ai_review_evidence_status", ai_review.get("evidence_status", "INVALID_EVIDENCE"))
          emit("changed_count", len(gate.get("changed_files") or []))
          emit("gate_errors", "; ".join((gate.get("errors") or [])[:5]))
          emit("architecture_errors", "; ".join((architecture.get("errors") or [])[:5]))
          emit("ai_review_observations", "; ".join((ai_review.get("observations") or [])[:5]))
          PY
      - name: Write merge-group authority claim
        if: ${{ inputs.merge-group-sha != '' }}
        shell: bash
        env:
          GH_TOKEN: ""
        run: |
          cd governance
          "${{ steps.toolchain.outputs.python-path }}" - <<'PY'
          import json
          import os
          from pathlib import Path

          from governance_eval.hashing import sha256_file
          from governance_eval.merge_group_authority import validate_merge_group_artifact
          from governance_eval.supportability import load_supportability_config

          target = Path("../target").resolve()
          config_path = (target / os.environ["CONFIG_PATH"]).resolve(strict=True)
          config_path.relative_to(target)
          config = load_supportability_config(config_path)
          standard_path = (target / config["standard"]["source"]).resolve(strict=True)
          standard_path.relative_to(target)
          authority = {
              "repository": {
                  "id": int(os.environ["REQUEST_REPOSITORY_ID"]),
                  "full_name": os.environ["TARGET_REPOSITORY"],
              },
              "merge_group": {
                  "ref": os.environ["MERGE_GROUP_REF"],
                  "sha": os.environ["MERGE_GROUP_SHA"],
                  "base_ref": "main",
                  "base_sha": os.environ["TARGET_BASE_SHA"],
              },
              "pull_request": {
                  "number": int(os.environ["TARGET_PR_NUMBER"]),
                  "url": os.environ["TARGET_PR_URL"],
                  "head_sha": os.environ["TARGET_PR_HEAD_SHA"],
                  "base_sha": os.environ["TARGET_PR_BASE_SHA"],
                  "base_ref": "main",
              },
          }
          validate_merge_group_artifact(authority, authority)
          claim = {
              **authority,
              "event_id": os.environ["MERGE_GROUP_EVENT_ID"],
              "event_created_at": os.environ["EVENT_CREATED_AT"],
              "evaluator_sha": os.environ["GOVERNANCE_REF"],
              "caller_workflow": {
                  "path": ".github/workflows/supportability-enforcement.yml",
                  "sha256": sha256_file(
                      target / ".github/workflows/supportability-enforcement.yml"
                  ),
              },
              "reusable_workflow": {
                  "path": ".github/workflows/supportability-gate.yml",
                  "sha256": sha256_file(
                      Path(".github/workflows/supportability-gate.yml")
                  ),
              },
              "workflow_run_id": int(os.environ["REQUEST_RUN_ID"]),
              "workflow_run_attempt": int(os.environ["REQUEST_RUN_ATTEMPT"]),
              "config_sha256": sha256_file(config_path),
              "standard_sha256": sha256_file(standard_path),
              "transaction_id": (
                  f"merge-group:{os.environ['REQUEST_RUN_ID']}:"
                  f"{os.environ['REQUEST_RUN_ATTEMPT']}:"
                  f"{os.environ['TARGET_PR_NUMBER']}"
              ),
          }
          destination = Path(
              "../target/artifacts/supportability/merge-group-authority.json"
          )
          destination.write_text(
              json.dumps(claim, indent=2, sort_keys=True) + "\n", encoding="utf-8"
          )
          PY
      - name: Upload supportability evidence
        id: upload
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: target/artifacts/supportability/*
          retention-days: 90
      - name: Write job summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Supportability Gate"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Commit SHA | \`${TARGET_HEAD_SHA}\` |"
            echo "| Owner status | \`${{ steps.summary.outputs.owner_status }}\` |"
            echo "| Changed file count | \`${{ steps.summary.outputs.changed_count }}\` |"
            echo "| Supportability gate | \`${{ steps.summary.outputs.gate_status }}\` |"
            echo "| Architecture gate | \`${{ steps.summary.outputs.architecture_status }}\` |"
            echo "| Gate implementation | \`${{ steps.summary.outputs.architecture_implementation }}\` |"
            echo "| Repo architecture supportability | \`${{ steps.summary.outputs.repo_architecture_supportability }}\` |"
            echo "| Architecture behavior proof | \`${{ steps.summary.outputs.architecture_behavior_proof }}\` |"
            echo "| Architecture violations | \`${{ steps.summary.outputs.architecture_violation_count }}\` |"
            echo "| New architecture violations | \`${{ steps.summary.outputs.architecture_new_violation_count }}\` |"
            echo "| Architecture known debt applied | \`${{ steps.summary.outputs.architecture_known_debt_applied_count }}\` |"
            echo "| Expired architecture known debt | \`${{ steps.summary.outputs.architecture_expired_known_debt_count }}\` |"
            echo "| AI review | \`${{ steps.summary.outputs.ai_review_status }}\` |"
            echo "| AI evidence status | \`${{ steps.summary.outputs.ai_review_evidence_status }}\` |"
            echo "| Gate errors | \`${{ steps.summary.outputs.gate_errors }}\` |"
            echo "| Architecture errors | \`${{ steps.summary.outputs.architecture_errors }}\` |"
            echo "| AI review observations | \`${{ steps.summary.outputs.ai_review_observations }}\` |"
            echo "| Artifact name | \`${ARTIFACT_NAME}\` |"
            echo "| Artifact ID | \`${{ steps.upload.outputs.artifact-id }}\` |"
            echo "| Artifact digest | \`${{ steps.upload.outputs.artifact-digest }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Fail closed on RED supportability evidence
        if: always() && steps.summary.outputs.owner_status != 'GREEN'
        shell: bash
        run: |
          echo "Supportability evidence is RED"
          exit 1
