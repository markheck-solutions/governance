standard:
  name: supportability-standard
  source: docs/reference/supportability-standard.md
  hash: "81653c5057c1555f8b6d41c6e5999d0b54caa178a2ca97a07216147ec16133e2"

required_gates:
  lint:
    - python -m compileall -q .
  format_check:
    - python -c "import os, subprocess, sys; sys.exit(subprocess.run(['git', 'diff', '--check', os.environ['TARGET_BASE_SHA'], os.environ['TARGET_HEAD_SHA']]).returncode)"
  typecheck:
    - python -m compileall -q .
  complexity:
    - python -m compileall -q .
  architecture:
    - python -m unittest discover -s tests -p test_*.py
  tests:
    - python -m unittest discover -s tests -p test_*.py
  compile_or_build:
    - python -m compileall -q .
  package_audit: []
  sql_supportability: auto

coverage:
  changed_files: required
  high_risk_files: required
  forbid_gate_scope_narrowing: true
  forbid_threshold_weakening: true

ai_review:
  copilot_required: true
  latest_head_required: true
  unresolved_p0_p1_p2_blocks: true
  reviewer_login_patterns:
    - "*copilot*"
    - "chatgpt-codex-connector*"

receipt:
  artifact_name: supportability-delivery-receipt
  retention_days: 90
